name: Windows CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_CACHE_SIZE: "2G"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            external/vcpkg/downloads
            vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'CMakePresets.json', '.gitmodules') }}

      - name: Bootstrap vcpkg
        shell: pwsh
        run: .\external\vcpkg\bootstrap-vcpkg.bat

      - name: Configure
        shell: pwsh
        run: >
          cmake --preset windows-debug --fresh
          -DGRPCMMO_REQUIRE_DATA_REPO=OFF
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded
          -DCMAKE_POLICY_CMP0141=NEW

      - name: Build
        shell: pwsh
        run: cmake --build --preset windows-debug

      - name: Test
        shell: pwsh
        run: ctest --test-dir build\windows -C Debug -L grpcmmo --output-on-failure

      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: $env:SCCACHE_PATH --show-stats
